# DFEPR Development Profile Configuration
# Used for local development and testing

profile: development
version: "1.0.0"

acquisition:
  write_block: true
  error_recovery: true
  verify_after_imaging: true
  hash_algorithm: "SHA256"
  metadata_capture: true
  sector_size: 512
  chunk_size_mb: 32  # Smaller chunks for development
  timeout_seconds: 1800

recovery:
  enable_photorec: true
  enable_scalpel: true
  enable_tsk: true
  carving_depth: 0
  metadata_recovery: true
  file_type_priorities:
    - "office"
    - "images"
    - "videos"
    - "archives"

reporting:
  formats:
    - "text"
    - "html"
    - "json"
  include_timeline: true
  include_recovered_files: true
  include_hash_verification: true
  signature_required: false
  digital_signature: false

storage:
  base_evidence_dir: "./evidence"
  log_dir: "./logs"
  temp_dir: "/tmp/dfepr_dev"
  archive_dir: "./archived_cases"
  backup_count: 5
  auto_cleanup_temp: true
  cleanup_age_days: 1  # Aggressive cleanup in dev

tools:
  ddrescue_path: "ddrescue"
  photorec_path: "photorec"
  scalpel_path: "scalpel"
  fls_path: "fls"
  icat_path: "icat"
  md5sum_path: "md5sum"
  sha256sum_path: "sha256sum"
  ensure_availability: false  # Optional tools for dev

acpo:
  principle_1_enabled: true
  principle_2_enabled: true
  principle_3_enabled: true
  principle_4_enabled: false  # Optional for dev
  case_id_format: "DEV_{year}_{seq:04d}"
  require_case_description: true
  require_investigator_details: true
  audit_log_required: true
  hash_verification_required: true

security:
  require_authentication: false  # Optional for local dev
  min_password_length: 8
  log_sensitive_data: true  # Enable for debugging
  encrypt_at_rest: false
  encryption_key_file: null
  session_timeout_minutes: 120
